baseURL = "https://blog.tfujiwara.tech"

title = "El blog de TFujiwara"

languageCode = "es"

DefaultContentLanguage = "es"

theme = "hugo.386"

preserveTaxonomyNames = true

# Hugo v0.141+: permite HTML raw en Markdown (necesario para hugotutorial2.md)
[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[params]

mainpagetitle = "El blog de TFujiwara"

mainpagesubtitle = "Sysadmin. Seguridad sin humo. Opiniones sin filtro."

copyrightname = "Cristian Garcia Quevedo"

showhugo = false

# Redes sociales
twitter  = "https://twitter.com/TFujiwara86"
linkedin = "https://www.linkedin.com/in/cgarciaquevedo/"
github   = "https://github.com/TFujiwara"
gitlab   = "https://gitlab.com/TFujiwara"
telegram = "https://t.me/SeguridadInformatica"

loadfastload    = false
loadspeedfactor = 1.0
loadonepass     = false

[params.copyright]
name   = "Cristian Garcia Quevedo"
suffix = "El blog de TFujiwara"

[menu]

[[menu.main]]
identifier = "about"
name       = "Sobre mí"
url        = "/about/"
weight     = 10

[[menu.main]]
identifier = "curriculum"
name       = "Curriculum Vitae"
url        = "https://tfujiwara.github.io/cv/"
weight     = 15

[[menu.main]]
identifier = "posts"
name       = "All posts"
url        = "/post/"
weight     = 20

[taxonomies]
category = "categories"

[privacy]

[privacy.vimeo]
disabled = false
simple   = true

[privacy.x]
disabled  = false
enableDNT = true
simple    = true

[privacy.instagram]
disabled = false
simple   = true

[privacy.youtube]
disabled        = false
privacyEnhanced = true

[services]

[services.instagram]
disableInlineCSS = true

[services.x]
disableInlineCSS = true
